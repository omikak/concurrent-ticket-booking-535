<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Concurrent Ticket Booking</title>
<style>
  body { font-family: Arial, sans-serif; text-align:center; }
  .seat { width: 50px; height: 50px; margin:5px; display:inline-block; cursor:pointer; }
  .available { background-color: green; }
  .locked { background-color: red; }
  .selected { background-color: blue; }
</style>
</head>
<body>
<h1>Concurrent Ticket Booking</h1>
<div id="seats"></div>

<script>
const userId = Math.floor(Math.random()*1000); // simulate user

async function fetchSeats() {
  const res = await fetch('/tickets/status');
  const seats = await res.json();
  renderSeats(seats);
}

async function lockSeat(seatId) {
  try {
    const res = await fetch('/tickets/lock', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({seatId, userId})
    });
    const data = await res.json();
    alert(data.message);
    fetchSeats();
  } catch(e){ console.error(e) }
}

function renderSeats(seats) {
  const container = document.getElementById('seats');
  container.innerHTML = '';
  for(const [seatId,status] of Object.entries(seats)){
    const btn = document.createElement('div');
    btn.className = 'seat ' + status;
    btn.innerText = seatId;
    btn.onclick = () => { if(status==='available') lockSeat(seatId) }
    container.appendChild(btn);
  }
}

fetchSeats();
setInterval(fetchSeats,5000); // refresh every 5s
</script>
</body>
</html>
